site:
  name: Boho Digital
  site: "https://bohodigitalservices.com"
  base: "/"
  trailingSlash: false

  googleSiteVerificationId: null

metadata:
  title:
    default: Boho Digital
    template: "%s | Boho Digital"
  description: "Organic growth, engineered beautifully. SEO, content, analytics, provider-transfer support, and climate-aware digital strategy for brands that want honest growth."
  robots:
    index: true
    follow: true
  openGraph:
    site_name: Boho Digital
    images:
      - url: "/assets/backgrounds/forest-path.webp"
        width: 1200
        height: 628
    type: website
  twitter:
    handle: ""
    site: ""
    cardType: summary_large_image

i18n:
  language: en
  textDirection: ltr

apps:
  blog:
    isEnabled: false
    postsPerPage: 6

    post:
      isEnabled: false
      permalink: "/%slug%"
      robots:
        index: false

    list:
      isEnabled: false
      pathname: "blog"
      robots:
        index: false

    category:
      isEnabled: false
      pathname: "category"
      robots:
        index: false

    tag:
      isEnabled: false
      pathname: "tag"
      robots:
        index: false

    isRelatedPostsEnabled: false
    relatedPostsCount: 0

analytics:
  vendors:
    googleAnalytics:
      id: null

ui:
  theme: "light:only"
